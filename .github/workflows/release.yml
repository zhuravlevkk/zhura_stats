name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows:
      - Tag Release Version
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read addon version from TOC
        id: version
        shell: pwsh
        run: |
          $tocPath = Join-Path $env:GITHUB_WORKSPACE 'ZhuraStats.toc'
          $versionLine = Select-String -Path $tocPath -Pattern '^## Version:\s*(.+)$' | Select-Object -First 1
          if (-not $versionLine) {
            throw "Could not find ## Version in ZhuraStats.toc"
          }

          $tocVersion = $versionLine.Matches[0].Groups[1].Value.Trim()
          $tagName = if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_run") {
            "v$tocVersion"
          } else {
            ""
          }

          $releaseVersion = if ($tagName) { $tagName.TrimStart('v') } else { $tocVersion }

          if ($tagName) {
            git rev-parse $tagName | Out-Null
          }

          "toc_version=$tocVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build release archive
        id: archive
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $stageRoot = Join-Path $env:RUNNER_TEMP 'release-stage'
          $addonDir = Join-Path $stageRoot 'ZhuraStats'
          $zipName = "ZhuraStats-${{ steps.version.outputs.release_version }}.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          if (Test-Path $stageRoot) {
            Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          New-Item -ItemType Directory -Path $addonDir -Force | Out-Null

          Copy-Item -LiteralPath (Join-Path $workspace 'ZhuraStats.toc') -Destination $addonDir
          Copy-Item -LiteralPath (Join-Path $workspace 'ZhuraStats.lua') -Destination $addonDir
          Copy-Item -LiteralPath (Join-Path $workspace 'embeds.xml') -Destination $addonDir
          Copy-Item -LiteralPath (Join-Path $workspace 'Locales') -Destination $addonDir -Recurse
          Copy-Item -LiteralPath (Join-Path $workspace 'Libs') -Destination $addonDir -Recurse
          if (Test-Path (Join-Path $workspace 'README.md')) {
            Copy-Item -LiteralPath (Join-Path $workspace 'README.md') -Destination $addonDir
          }
          if (Test-Path (Join-Path $workspace 'LICENSE')) {
            Copy-Item -LiteralPath (Join-Path $workspace 'LICENSE') -Destination $addonDir
          }

          Compress-Archive -Path $addonDir -DestinationPath $zipPath -Force

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.zip_name }}
          path: ${{ steps.archive.outputs.zip_path }}

      - name: Create GitHub release
        if: steps.version.outputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          name: NE Stats ${{ steps.version.outputs.release_version }}
          tag_name: ${{ steps.version.outputs.tag_name }}
          files: ${{ steps.archive.outputs.zip_path }}
          generate_release_notes: true
